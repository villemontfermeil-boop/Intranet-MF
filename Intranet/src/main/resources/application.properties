# application.properties (sanitized)
# IMPORTANT: This file has been sanitized for public repository. Do NOT commit real secrets.
# Use environment variables to set sensitive values in production or local env files ignored by git.

spring.application.name=Intranet-App

# Datasource - set these via environment variables (example names below)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/montfermeil_dtb?useSSL=false&serverTimezone=UTC&useUnicode=true&characterEncoding=utf8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Keycloak issuer - use env var
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:https://keycloak.example.local/realms/intranet-montfermeil}

# JPA / Hibernate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Server
server.address=0.0.0.0
server.port=8080

# File upload limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Application paths
app.upload.dir=./uploads

# Encoding
spring.web.encoding.charset=UTF-8
spring.web.encoding.force=true

# AI keys - use env vars
# ai.api.key=${AI_API_KEY:}
# mistral.api.key=${MISTRAL_API_KEY:}

ai.api.url=${AI_API_URL:https://api.mistral.ai/v1/chat/completions}

management.endpoints.web.exposure.include=mappings
