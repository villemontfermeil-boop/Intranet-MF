spring.application.name=Intranet-App

# Configuration de la source de données MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/montfermeil_dtb?useSSL=false&serverTimezone=UTC
spring.datasource.username=Admin_MF
spring.datasource.password=Commontf_93?
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://192.168.56.11:8081/realms/intranet-montfermeil
# Pour Spring Boot avec Hibernate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
server.address=0.0.0.0
server.port=8080
# Configuration de JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Base de données MySQL, Hibernate 7.x choisit automatiquement le bon dialecte pour MySQL 8
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# Taille max des fichiers
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Chemin où stocker les fichiers
app.upload.dir=./uploads