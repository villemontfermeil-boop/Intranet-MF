# Pour Spring Boot avec Hibernate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
server.address=0.0.0.0
server.port=8080
# Configuration de JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Base de données MySQL, Hibernate 7.x choisit automatiquement le bon dialecte pour MySQL 8
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# Taille max des fichiers
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Chemin où stocker les fichiers
app.upload.dir=./uploads

# Realm Keycloak
spring.web.encoding.charset=UTF-8
spring.web.encoding.force=true

